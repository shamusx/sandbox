apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 5m
  chart:
    spec:
      chart: istiod
      version: 1.16.7-tetrate-v3
      sourceRef:
        kind: HelmRepository
        name: tetratelabs
        namespace: istio-system
      interval: 1m
  values:
    istio_cni:
      enabled: true